$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Prompt Metadata Schema"
type: object
additionalProperties: false
required:
  - id
  - name
  - version
  - owner
  - status
  - tags
  - purpose
  - prompt_type
  - input_contract
  - output_contract
  - constraints
  - security
  - error_handling
properties:
  id:
    type: string
    pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
  name:
    type: string
    minLength: 3
  version:
    type: string
    pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  owner:
    type: string
    minLength: 2
  status:
    type: string
    enum: ["draft", "active", "deprecated"]
  tags:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 2
  purpose:
    type: string
    minLength: 20
  prompt_type:
    type: string
    enum: ["system", "user", "assistant", "workflow"]
  input_contract:
    type: string
    minLength: 20
  output_contract:
    type: string
    minLength: 20
  constraints:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 3
  security:
    type: string
    minLength: 20
  error_handling:
    type: string
    minLength: 20
